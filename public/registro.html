<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Previsualización Resumen Diario v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 min-h-screen text-white p-4 md:p-8">

  <header class="flex flex-wrap items-center gap-4 mb-6 max-w-7xl mx-auto">
    <a href="/" class="flex items-center justify-center w-10 h-10 rounded-xl bg-gray-800
                       hover:bg-gray-700 text-gray-400 hover:text-white transition-colors
                       text-xl font-bold shrink-0">←</a>
    <div class="flex-1 min-w-0">
      <h1 class="text-3xl md:text-4xl font-black">
        Previsualización del Resumen Diario
        <span class="text-indigo-400 text-2xl font-bold ml-2">v2</span>
      </h1>
      <p class="text-gray-500 text-sm mt-0.5" id="fecha-display"></p>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      <label class="text-gray-500 text-xs font-semibold uppercase tracking-wider">Fecha</label>
      <input type="date" id="input-fecha"
             class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-white text-sm
                    focus:outline-none focus:border-emerald-500 transition-colors" />
    </div>
  </header>

  <main class="max-w-7xl mx-auto space-y-4">
    <div class="bg-gray-900 border border-gray-700 rounded-2xl p-4 md:p-6">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
        <div>
          <h2 class="text-xl font-black">Consolidado del Día</h2>
          <p class="text-gray-500 text-sm">Resumen dinámico de planificación y ejecución por producto y destino.</p>
        </div>
        <button id="btn-excel-dia" onclick="descargarExcelDia()"
                class="bg-emerald-700 hover:bg-emerald-600 active:bg-emerald-800
                       text-white font-black py-3 px-5 rounded-xl transition-all tracking-wide">
          ⬇️ Descargar Excel del Día
        </button>
      </div>

      <div id="toast" class="hidden text-center py-3 px-5 rounded-xl font-semibold text-sm mb-4"></div>

      <!-- Tabla dinámica (columnas de destinos se generan desde BD2) -->
      <div class="overflow-auto rounded-xl border border-gray-800">
        <table class="min-w-full text-sm" id="tabla-resumen">
          <thead id="thead-resumen" class="bg-gray-800 text-gray-300 uppercase text-xs tracking-widest">
            <tr>
              <th class="px-4 py-3 text-left">Producto</th>
              <th class="px-4 py-3 text-right">Total Planeado</th>
              <th class="px-4 py-3 text-right">Total Real</th>
              <th class="px-4 py-3 text-right">No Producido</th>
            </tr>
          </thead>
          <tbody id="tbody-resumen" class="divide-y divide-gray-800 bg-gray-900">
            <tr><td colspan="4" class="px-4 py-8 text-center text-gray-500 animate-pulse">Cargando…</td></tr>
          </tbody>
          <tfoot id="tfoot-resumen" class="bg-gray-800/80 border-t border-emerald-700/60"></tfoot>
        </table>
      </div>
    </div>
  </main>

  <script>
    const getLocalISODate = () => {
      const now = new Date();
      return new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
    };
    const today = getLocalISODate();
    const fechaInput = document.getElementById('input-fecha');
    fechaInput.value = today;

    document.getElementById('fecha-display').textContent = new Date().toLocaleDateString('es-PE', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
    fechaInput.addEventListener('change', cargarResumen);

    function showToast(msg, type = 'ok') {
      const el = document.getElementById('toast');
      const ok  = 'text-center py-3 px-5 rounded-xl font-semibold text-sm mb-4 bg-green-900 text-green-300 border border-green-700';
      const err = 'text-center py-3 px-5 rounded-xl font-semibold text-sm mb-4 bg-red-900 text-red-300 border border-red-700';
      el.className = type === 'ok' ? ok : err;
      el.textContent = msg;
      clearTimeout(el._t);
      el._t = setTimeout(() => { el.className = 'hidden'; }, 4500);
    }

    const fmt = n => Number(n || 0).toLocaleString('es-CL');

    function renderTabla(rows) {
      const tbody = document.getElementById('tbody-resumen');
      const tfoot = document.getElementById('tfoot-resumen');
      const thead = document.getElementById('thead-resumen');

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="10" class="px-4 py-8 text-center text-gray-500">No hay datos para esta fecha en kitchen_db2.</td></tr>';
        tfoot.innerHTML = '';
        return;
      }

      // Detectar destinos dinámicamente desde el primer registro
      const destinos = rows[0].destinos || [];
      const colSpan  = 4 + destinos.length * 2;

      // Reconstruir cabecera con columnas dinámicas
      thead.innerHTML = `<tr>
        <th class="px-4 py-3 text-left">Producto</th>
        <th class="px-4 py-3 text-right text-indigo-300">Total Plan.</th>
        <th class="px-4 py-3 text-right text-emerald-300">Total Real</th>
        <th class="px-4 py-3 text-right text-amber-300">No Produc.</th>
        ${destinos.map(d => `
          <th class="px-4 py-3 text-right text-purple-300">Plan ${d.nombre}</th>
          <th class="px-4 py-3 text-right text-purple-200">Real ${d.nombre}</th>
        `).join('')}
      </tr>`;

      const totales = { planificado: 0, real: 0, no_producido: 0 };
      const totDest = {};
      destinos.forEach(d => { totDest[d.destino_id] = { plan: 0, real: 0 }; });

      tbody.innerHTML = rows.map(r => {
        totales.planificado  += Number(r.total_planificado)  || 0;
        totales.real         += Number(r.total_real)         || 0;
        totales.no_producido += Number(r.total_no_producido) || 0;

        const destCols = (r.destinos || []).map(d => {
          totDest[d.destino_id].plan += d.cantidad_planificada || 0;
          totDest[d.destino_id].real += d.cantidad_real        || 0;
          return `
            <td class="px-4 py-3 text-right text-purple-300">${fmt(d.cantidad_planificada)}</td>
            <td class="px-4 py-3 text-right text-purple-200">${fmt(d.cantidad_real)}</td>`;
        }).join('');

        return `<tr class="hover:bg-gray-800/40 transition-colors">
          <td class="px-4 py-3 text-white font-semibold">${r.nombre}</td>
          <td class="px-4 py-3 text-right text-indigo-300 font-bold">${fmt(r.total_planificado)}</td>
          <td class="px-4 py-3 text-right text-emerald-300 font-bold">${fmt(r.total_real)}</td>
          <td class="px-4 py-3 text-right text-amber-300 font-bold">${fmt(r.total_no_producido)}</td>
          ${destCols}
        </tr>`;
      }).join('');

      const totDestCols = destinos.map(d => `
        <td class="px-4 py-3 text-right font-black text-purple-300">${fmt(totDest[d.destino_id].plan)}</td>
        <td class="px-4 py-3 text-right font-black text-purple-200">${fmt(totDest[d.destino_id].real)}</td>
      `).join('');

      tfoot.innerHTML = `<tr>
        <td class="px-4 py-3 text-left font-black text-white">TOTAL GENERAL</td>
        <td class="px-4 py-3 text-right font-black text-indigo-300">${fmt(totales.planificado)}</td>
        <td class="px-4 py-3 text-right font-black text-emerald-300">${fmt(totales.real)}</td>
        <td class="px-4 py-3 text-right font-black text-amber-300">${fmt(totales.no_producido)}</td>
        ${totDestCols}
      </tr>`;
    }

    async function cargarResumen() {
      const fecha = fechaInput.value;
      document.getElementById('tbody-resumen').innerHTML =
        '<tr><td colspan="10" class="px-4 py-8 text-center text-gray-500 animate-pulse">Cargando…</td></tr>';
      try {
        const res  = await fetch(`/api/v2/resumen_diario?fecha=${fecha}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error al cargar');
        renderTabla(Array.isArray(data) ? data : []);
      } catch (e) {
        document.getElementById('tbody-resumen').innerHTML =
          '<tr><td colspan="10" class="px-4 py-8 text-center text-red-400">❌ Error al cargar datos de kitchen_db2.</td></tr>';
        showToast(e.message, 'err');
      }
    }

    async function descargarExcelDia() {
      const fecha = fechaInput.value;
      const btn = document.getElementById('btn-excel-dia');
      btn.disabled = true; btn.textContent = '⏳ Generando…';
      try {
        const r = await fetch(`/api/v2/informes/excel?fecha_inicio=${fecha}&fecha_fin=${fecha}`);
        if (!r.ok) {
          const e = await r.json().catch(() => ({ error: 'Error desconocido.' }));
          throw new Error(e.error || 'Error del servidor.');
        }
        const blob = await r.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url; a.download = `produccion_v2_${fecha}.xlsx`;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
        showToast('✅ Excel descargado correctamente.', 'ok');
      } catch (e) {
        showToast('❌ ' + e.message, 'err');
      } finally {
        btn.disabled = false; btn.textContent = '⬇️ Descargar Excel del Día';
      }
    }

    cargarResumen();
  </script>
</body>
</html>
