<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>&#127859; Registro de Produccion</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 min-h-screen text-white p-4 md:p-8">

  <header class="flex flex-wrap items-center gap-4 mb-6 max-w-4xl mx-auto">
    <a href="/" class="flex items-center justify-center w-10 h-10 rounded-xl
              bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-white
              transition-colors text-xl font-bold shrink-0">&#8592;</a>
    <div class="flex-1 min-w-0">
      <h1 class="text-3xl md:text-4xl font-black">&#127859; Registro de Produccion</h1>
      <p class="text-gray-500 text-sm mt-0.5" id="fecha-display"></p>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      <label class="text-gray-500 text-xs font-semibold uppercase tracking-wider">Fecha</label>
      <input type="date" id="input-fecha"
             class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-2
                    text-white text-sm focus:outline-none focus:border-orange-500 transition-colors" />
    </div>
  </header>

  <div class="max-w-4xl mx-auto space-y-4">

    <!-- INFO -->
    <div class="bg-orange-950/50 border border-orange-800/60 rounded-2xl px-5 py-3 flex items-start gap-3">
      <span class="text-lg shrink-0 mt-0.5">&#128204;</span>
      <p class="text-orange-200 text-sm leading-relaxed">
        Registra la <strong class="text-white">Cantidad Real</strong> producida, las
        <strong class="text-white">Mermas</strong> y cualquier
        <strong class="text-white">Comentario</strong> por producto.
        La distribucion <em>Sala / Tienda / Marley</em> es informativa y fue definida en la planificacion.
      </p>
    </div>

    <!-- LISTA DE PRODUCTOS -->
    <div id="lista-productos">
      <div class="py-12 text-center text-gray-600 animate-pulse">&#9203; Cargando...</div>
    </div>

    <!-- BOTON GUARDAR TODO -->
    <button id="btn-todo" onclick="guardarTodo()" disabled
            class="w-full bg-orange-800 text-gray-400 font-black py-5 rounded-2xl text-2xl
                   transition-all tracking-widest cursor-not-allowed opacity-50 shadow-xl">
      &#128190; GUARDAR TODO
    </button>
    <div id="toast-todo" class="hidden text-center py-3 px-5 rounded-xl font-semibold text-base"></div>

  </div>

  <script>
    const today = new Date().toISOString().slice(0, 10);
    const fechaInput = document.getElementById('input-fecha');
    fechaInput.value = today;
    document.getElementById('fecha-display').textContent =
      new Date().toLocaleDateString('es-PE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    fechaInput.addEventListener('change', () => cargar(fechaInput.value));

    function toast(id, msg, tipo) {
      const el  = document.getElementById(id);
      const ok  = 'text-center py-3 px-5 rounded-xl font-semibold text-base bg-green-900 text-green-300 border border-green-700';
      const err = 'text-center py-3 px-5 rounded-xl font-semibold text-base bg-red-900 text-red-300 border border-red-700';
      el.className = tipo === 'ok' ? ok : err;
      el.textContent = msg;
      clearTimeout(el._t);
      el._t = setTimeout(() => { el.className = 'hidden'; }, 4000);
    }

    function habilitarGuardarTodo() {
      const btn = document.getElementById('btn-todo');
      btn.disabled  = false;
      btn.className = 'w-full bg-orange-700 hover:bg-orange-600 active:bg-orange-800 text-white font-black py-5 rounded-2xl text-2xl transition-all tracking-widest cursor-pointer shadow-xl shadow-orange-900/40';
    }

    function renderLista(productos) {
      if (!productos.length) {
        document.getElementById('lista-productos').innerHTML =
          '<div class="py-12 text-center text-gray-600">No hay productos planificados para este dia.</div>';
        return;
      }

      const calientes = productos.filter(p => p.tipo_cuarto === 'Caliente');
      const frios     = productos.filter(p => p.tipo_cuarto === 'Frio' || p.tipo_cuarto === 'Fr\u00edo');

      const inputCls = 'w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-white font-bold text-base focus:outline-none transition-colors';

      function tarjetas(lista) {
        return lista.map(p => {
          const icon       = (p.tipo_cuarto === 'Caliente') ? '&#128293;' : '&#10052;&#65039;';
          const planTotal  = (p.cant_sala || 0) + (p.cant_tienda || 0) + (p.cant_marley || 0);
          const real       = p.cantidad_real || '';
          const mermas     = p.mermas        || '';
          const coment     = p.comentarios   || '';
          return `
            <div id="card-${p.plu_id}" class="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden">
              <!-- Cabecera tarjeta -->
              <div class="px-5 py-3 flex flex-wrap items-center gap-3 bg-gray-800/40 border-b border-gray-700/50">
                <span class="text-xl">${icon}</span>
                <div class="flex-1 min-w-0">
                  <p class="font-black text-lg leading-tight">${p.nombre}</p>
                  <p class="text-gray-500 text-xs font-mono">${p.plu_id}</p>
                </div>
                <!-- Badges Sala / Tienda / Marley (solo lectura) -->
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="bg-purple-900/60 text-purple-300 text-xs font-bold px-3 py-1.5 rounded-full border border-purple-700/50">
                    &#127968; Sala: ${p.cant_sala || 0}
                  </span>
                  <span class="bg-sky-900/60 text-sky-300 text-xs font-bold px-3 py-1.5 rounded-full border border-sky-700/50">
                    &#127978; Tienda: ${p.cant_tienda || 0}
                  </span>
                  <span class="bg-amber-900/60 text-amber-300 text-xs font-bold px-3 py-1.5 rounded-full border border-amber-700/50">
                    &#127381; Marley: ${p.cant_marley || 0}
                  </span>
                  <span class="bg-green-900/60 text-green-300 text-xs font-bold px-3 py-1.5 rounded-full border border-green-700/50">
                    Total plan: ${planTotal}
                  </span>
                </div>
              </div>
              <!-- Inputs -->
              <div class="p-5 grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                  <label class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1.5 block">Cantidad Real</label>
                  <input type="number" min="0" id="real-${p.plu_id}" value="${real}" placeholder="0"
                         oninput="habilitarGuardarTodo()"
                         class="${inputCls} focus:border-orange-500" />
                </div>
                <div>
                  <label class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1.5 block">Mermas</label>
                  <input type="number" min="0" id="merma-${p.plu_id}" value="${mermas}" placeholder="0"
                         oninput="habilitarGuardarTodo()"
                         class="${inputCls} focus:border-yellow-500" />
                </div>
                <div class="sm:col-span-2">
                  <label class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1.5 block">Comentarios</label>
                  <input type="text" id="comentario-${p.plu_id}" value="${coment}"
                         placeholder="Observaciones opcionales..."
                         oninput="habilitarGuardarTodo()"
                         class="${inputCls} focus:border-gray-500" />
                </div>
              </div>
              <!-- Pie tarjeta -->
              <div class="px-5 pb-4 flex items-center gap-3">
                <button id="btn-save-${p.plu_id}" onclick="guardarFila('${p.plu_id}')"
                        class="bg-gray-700 hover:bg-gray-600 text-white font-bold px-4 py-2 rounded-xl text-sm transition-colors">
                  &#128190; Guardar esta fila
                </button>
                <span id="toast-${p.plu_id}" class="hidden text-sm font-semibold"></span>
              </div>
            </div>`;
        }).join('');
      }

      let html = '';
      if (calientes.length) {
        html += `<div class="mb-2 flex items-center gap-2">
          <span class="text-orange-400 font-black text-sm uppercase tracking-widest">&#128293; Cuarto Caliente</span>
          <span class="bg-orange-900/50 text-orange-400 text-xs font-bold px-2 py-0.5 rounded-full">${calientes.length}</span>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">${tarjetas(calientes)}</div>`;
      }
      if (frios.length) {
        html += `<div class="mb-2 flex items-center gap-2">
          <span class="text-blue-400 font-black text-sm uppercase tracking-widest">&#10052;&#65039; Cuarto Frio</span>
          <span class="bg-blue-900/50 text-blue-400 text-xs font-bold px-2 py-0.5 rounded-full">${frios.length}</span>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${tarjetas(frios)}</div>`;
      }

      document.getElementById('lista-productos').innerHTML = html;
    }

    async function cargar(fecha) {
      document.getElementById('lista-productos').innerHTML =
        '<div class="py-12 text-center text-gray-600 animate-pulse">&#9203; Cargando...</div>';
      try {
        const res  = await fetch('/api/produccion?fecha=' + fecha);
        const data = await res.json();
        renderLista(data);
      } catch {
        document.getElementById('lista-productos').innerHTML =
          '<div class="py-12 text-center text-red-500">&#10060; Error al cargar datos.</div>';
      }
    }

    async function guardarFila(plu_id) {
      const fecha         = fechaInput.value;
      const cantidad_real = parseInt(document.getElementById('real-'       + plu_id).value) || 0;
      const mermas        = parseInt(document.getElementById('merma-'      + plu_id).value) || 0;
      const comentarios   =          document.getElementById('comentario-' + plu_id).value.trim();

      const btn   = document.getElementById('btn-save-' + plu_id);
      const toastEl = document.getElementById('toast-' + plu_id);

      btn.disabled    = true;
      btn.textContent = '&#9203;';

      try {
        const res  = await fetch('/api/produccion', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fecha, plu_id, cantidad_real, mermas, comentarios }),
        });
        const data = await res.json();
        if (data.success) {
          toastEl.className   = 'text-sm font-semibold text-green-400';
          toastEl.textContent = '&#10003; Guardado!';
          document.getElementById('card-' + plu_id).classList.add('ring-1', 'ring-green-700');
        } else {
          toastEl.className   = 'text-sm font-semibold text-red-400';
          toastEl.textContent = '&#10060; Error.';
        }
      } catch {
        toastEl.className   = 'text-sm font-semibold text-red-400';
        toastEl.textContent = '&#10060; Sin conexion.';
      }

      btn.disabled    = false;
      btn.textContent = '&#128190; Guardar esta fila';
      setTimeout(() => { toastEl.className = 'hidden'; toastEl.textContent = ''; }, 3500);
    }

    async function guardarTodo() {
      const btn   = document.getElementById('btn-todo');
      const fecha = fechaInput.value;
      btn.disabled    = true;
      btn.textContent = '&#9203; Guardando...';

      const inputs = document.querySelectorAll('[id^="real-"]');
      let ok = 0, errores = 0;
      for (const inp of inputs) {
        const plu_id      = inp.id.replace('real-', '');
        const cantidad_real = parseInt(inp.value) || 0;
        const mermas      = parseInt(document.getElementById('merma-'      + plu_id).value) || 0;
        const comentarios =          document.getElementById('comentario-' + plu_id).value.trim();
        try {
          const res  = await fetch('/api/produccion', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fecha, plu_id, cantidad_real, mermas, comentarios }),
          });
          const data = await res.json();
          if (data.success) ok++; else errores++;
        } catch { errores++; }
      }

      const toastEl = document.getElementById('toast-todo');
      if (errores === 0) {
        toastEl.className   = 'text-center py-3 px-5 rounded-xl font-semibold text-base bg-green-900 text-green-300 border border-green-700';
        toastEl.textContent = '\u2713 Todo guardado! ' + ok + ' producto(s) registrados.';
      } else {
        toastEl.className   = 'text-center py-3 px-5 rounded-xl font-semibold text-base bg-red-900 text-red-300 border border-red-700';
        toastEl.textContent = '\u26a0 ' + errores + ' errores al guardar.';
      }
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => { toastEl.className = 'hidden'; }, 4000);

      btn.textContent = '&#128190; GUARDAR TODO';
      btn.disabled    = false;
    }

    cargar(today);
  </script>
</body>
</html>
