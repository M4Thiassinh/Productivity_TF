<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Previsualización Resumen Diario</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 min-h-screen text-white p-4 md:p-8">
  <header class="flex flex-wrap items-center gap-4 mb-6 max-w-7xl mx-auto">
    <a href="/" class="flex items-center justify-center w-10 h-10 rounded-xl bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-white transition-colors text-xl font-bold shrink-0">←</a>
    <div class="flex-1 min-w-0">
      <h1 class="text-3xl md:text-4xl font-black">Previsualización del Resumen Diario</h1>
      <p class="text-gray-500 text-sm mt-0.5" id="fecha-display"></p>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      <label class="text-gray-500 text-xs font-semibold uppercase tracking-wider">Fecha</label>
      <input type="date" id="input-fecha" class="bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-white text-sm focus:outline-none focus:border-emerald-500 transition-colors" />
    </div>
  </header>

  <main class="max-w-7xl mx-auto space-y-4">
    <div class="bg-gray-900 border border-gray-700 rounded-2xl p-4 md:p-6">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
        <div>
          <h2 class="text-xl font-black">Consolidado del Día</h2>
          <p class="text-gray-500 text-sm">Resumen de planificación y ejecución por producto.</p>
        </div>
        <button id="btn-excel-dia" onclick="descargarExcelDia()" class="bg-emerald-700 hover:bg-emerald-600 active:bg-emerald-800 text-white font-black py-3 px-5 rounded-xl transition-all tracking-wide">
          Descargar Excel del Día
        </button>
      </div>

      <div id="toast" class="hidden text-center py-3 px-5 rounded-xl font-semibold text-sm mb-4"></div>

      <div class="overflow-auto rounded-xl border border-gray-800">
        <table class="min-w-full text-sm">
          <thead class="bg-gray-800 text-gray-300 uppercase text-xs tracking-widest">
            <tr>
              <th class="px-4 py-3 text-left">Producto</th>
              <th class="px-4 py-3 text-right">Total Planeado</th>
              <th class="px-4 py-3 text-right">Total Real</th>
              <th class="px-4 py-3 text-right">Total No Producido</th>
              <th class="px-4 py-3 text-right">Total Sala</th>
              <th class="px-4 py-3 text-right">Total Tienda</th>
              <th class="px-4 py-3 text-right">Total Marley</th>
            </tr>
          </thead>
          <tbody id="tbody-resumen" class="divide-y divide-gray-800 bg-gray-900"></tbody>
          <tfoot id="tfoot-resumen" class="bg-gray-800/80 border-t border-emerald-700/60"></tfoot>
        </table>
      </div>
    </div>
  </main>

  <script>
    const getLocalISODate = () => {
      const now = new Date();
      const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 10);
    };
    const today = getLocalISODate();
    const fechaInput = document.getElementById('input-fecha');
    fechaInput.value = today;

    document.getElementById('fecha-display').textContent = new Date().toLocaleDateString('es-PE', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    fechaInput.addEventListener('change', () => cargarResumen());

    function showToast(msg, type = 'ok') {
      const el = document.getElementById('toast');
      const ok = 'text-center py-3 px-5 rounded-xl font-semibold text-sm mb-4 bg-green-900 text-green-300 border border-green-700';
      const err = 'text-center py-3 px-5 rounded-xl font-semibold text-sm mb-4 bg-red-900 text-red-300 border border-red-700';
      el.className = type === 'ok' ? ok : err;
      el.textContent = msg;
      clearTimeout(el._t);
      el._t = setTimeout(() => { el.className = 'hidden'; }, 4500);
    }

    function formatNum(n) {
      return Number(n || 0).toLocaleString('es-CL');
    }
 
    function renderTabla(rows) {
      const tbody = document.getElementById('tbody-resumen');
      const tfoot = document.getElementById('tfoot-resumen');
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-500">No hay datos para esta fecha.</td></tr>';
        tfoot.innerHTML = '';
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr class="hover:bg-gray-800/40 transition-colors">
          <td class="px-4 py-3 text-white font-semibold">${r.nombre}</td>
          <td class="px-4 py-3 text-right text-cyan-300 font-bold">${formatNum(r.total_planeado)}</td>
          <td class="px-4 py-3 text-right text-emerald-300 font-bold">${formatNum(r.total_real)}</td>
          <td class="px-4 py-3 text-right text-amber-300 font-bold">${formatNum(r.total_no_producido)}</td>
          <td class="px-4 py-3 text-right text-gray-200">${formatNum(r.total_sala)}</td>
          <td class="px-4 py-3 text-right text-gray-200">${formatNum(r.total_tienda)}</td>
          <td class="px-4 py-3 text-right text-gray-200">${formatNum(r.total_marley)}</td>
        </tr>`).join('');

      const totales = rows.reduce((acc, r) => {
        acc.total_planeado     += Number(r.total_planeado) || 0;
        acc.total_real         += Number(r.total_real) || 0;
        acc.total_no_producido += Number(r.total_no_producido) || 0;
        acc.total_sala         += Number(r.total_sala) || 0;
        acc.total_tienda       += Number(r.total_tienda) || 0;
        acc.total_marley       += Number(r.total_marley) || 0;
        return acc;
      }, {
        total_planeado: 0,
        total_real: 0,
        total_no_producido: 0,
        total_sala: 0,
        total_tienda: 0,
        total_marley: 0,
      });

      tfoot.innerHTML = `
        <tr>
          <td class="px-4 py-3 text-left font-black text-white">TOTAL GENERAL</td>
          <td class="px-4 py-3 text-right font-black text-cyan-300">${formatNum(totales.total_planeado)}</td>
          <td class="px-4 py-3 text-right font-black text-emerald-300">${formatNum(totales.total_real)}</td>
          <td class="px-4 py-3 text-right font-black text-amber-300">${formatNum(totales.total_no_producido)}</td>
          <td class="px-4 py-3 text-right font-black text-gray-100">${formatNum(totales.total_sala)}</td>
          <td class="px-4 py-3 text-right font-black text-gray-100">${formatNum(totales.total_tienda)}</td>
          <td class="px-4 py-3 text-right font-black text-gray-100">${formatNum(totales.total_marley)}</td>
        </tr>`;
    }

    async function cargarResumen() {
      const fecha = fechaInput.value;
      const tbody = document.getElementById('tbody-resumen');
      tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-500 animate-pulse">Cargando...</td></tr>';
      try {
        const res = await fetch(`/api/resumen_diario?fecha=${fecha}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'No se pudo cargar el resumen.');
        renderTabla(Array.isArray(data) ? data : []);
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-red-400">Error de carga.</td></tr>';
        showToast(e.message, 'err');
      }
    }

    async function descargarExcelDia() {
      const fecha = fechaInput.value;
      const btn = document.getElementById('btn-excel-dia');
      btn.disabled = true;
      btn.textContent = 'Generando...';

      try {
        const response = await fetch(`/api/informes/excel?fecha_inicio=${fecha}&fecha_fin=${fecha}`);
        if (!response.ok) {
          const err = await response.json().catch(() => ({ error: 'Error desconocido.' }));
          throw new Error(err.error || 'Error del servidor.');
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `produccion_${fecha}.xlsx`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showToast('Excel del día descargado correctamente.', 'ok');
      } catch (e) {
        showToast(e.message, 'err');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Descargar Excel del Día';
      }
    }

    cargarResumen();
  </script>
</body>
</html>
