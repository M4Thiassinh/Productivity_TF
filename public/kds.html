<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KDS Interactivo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .blink { animation: blink 0.8s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gray-950 min-h-screen p-4 md:p-8">
  <header class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-8">
    <div class="flex items-center gap-4">
      <a href="/" class="flex items-center justify-center w-10 h-10 rounded-xl bg-gray-900 hover:bg-gray-800 text-gray-600 hover:text-white transition-colors text-xl font-bold shrink-0">←</a>
      <div>
        <h1 class="text-3xl md:text-4xl font-black text-white tracking-tight">KDS Interactivo</h1>
        <p class="text-gray-500 text-sm" id="fecha-display"></p>
      </div>
    </div>
    <div class="flex items-center gap-4 sm:text-right">
      <div class="text-right">
        <div class="text-xs text-gray-600 uppercase tracking-wider">Última actualización</div>
        <div class="text-gray-400 font-mono text-sm" id="ultima-act">—</div>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-2xl px-5 py-3 text-center">
        <div class="text-4xl font-black font-mono text-emerald-400" id="countdown">30s</div>
        <div class="text-gray-600 text-xs mt-0.5">próxima recarga</div>
      </div>
    </div>
  </header>

  <div id="banner-estado" class="hidden mb-6 text-center py-4 rounded-2xl font-bold text-xl"></div>
  <main id="kds-root"></main>

  <datalist id="lista-cocineros"></datalist>

  <div id="modal-overlay" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-40"></div>
  <div id="modal-registro" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="w-full max-w-xl rounded-3xl border border-gray-700 bg-gray-900 shadow-2xl">
      <div class="px-6 py-5 border-b border-gray-700 flex items-start justify-between gap-4">
        <div>
          <p class="text-xs font-bold uppercase tracking-widest text-gray-500" id="modal-plu"></p>
          <h2 class="text-2xl font-black text-white leading-tight" id="modal-nombre"></h2>
          <p class="text-sm text-gray-400 mt-1" id="modal-plan"></p>
        </div>
        <button onclick="cerrarModal()" class="w-9 h-9 rounded-xl bg-gray-800 hover:bg-gray-700 text-gray-300">✕</button>
      </div>
      <div class="p-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="sm:col-span-2">
          <label class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1.5 block">Cocinero</label>
          <input id="modal-cocinero" list="lista-cocineros" type="text" autocomplete="off" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-white font-bold text-base focus:outline-none focus:border-violet-500" />
        </div>
        <div>
          <label class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1.5 block">Cantidad Real</label>
          <input id="modal-real" type="number" min="0" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-white font-bold text-base focus:outline-none focus:border-orange-500" />
        </div>
        <div>
          <label class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1.5 block">No Producido</label>
          <input id="modal-no-producido" type="number" min="0" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-white font-bold text-base focus:outline-none focus:border-yellow-500" />
        </div>
        <div class="sm:col-span-2">
          <label class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-1.5 block">Comentarios</label>
          <input id="modal-comentarios" type="text" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-white text-base focus:outline-none focus:border-gray-500" />
        </div>
      </div>
      <div class="px-6 pb-6 flex items-center justify-end gap-3">
        <span id="modal-msg" class="text-sm font-semibold text-gray-400 mr-auto"></span>
        <button onclick="cerrarModal()" class="px-4 py-2 rounded-xl bg-gray-800 hover:bg-gray-700 text-gray-300 font-bold">Cancelar</button>
        <button id="btn-modal-guardar" onclick="guardarModal()" class="px-5 py-2 rounded-xl bg-emerald-700 hover:bg-emerald-600 text-white font-black">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    const REFRESH_INTERVAL = 30;
    const today = new Date().toISOString().slice(0, 10);

    let segundos = 0;
    let cocineros = [];
    let itemsKds = [];
    let modalItem = null;

    document.getElementById('fecha-display').textContent = new Date().toLocaleDateString('es-PE', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    function esFinalizado(item) {
      return !!item.registro_id;
    }

    function estadoCard(item) {
      if (esFinalizado(item)) {
        return {
          card: 'border-emerald-600 bg-emerald-950/40',
          badge: 'bg-emerald-900 text-emerald-300',
          num: 'text-emerald-300',
          done: '<span class="inline-flex items-center gap-1 text-xs font-bold px-2 py-1 rounded-full bg-emerald-900 text-emerald-300">✓ Preparado</span>',
          titleCls: 'line-through text-emerald-100'
        };
      }
      if (item.tipo_cuarto === 'Caliente') {
        return {
          card: 'border-orange-700 bg-gray-900',
          badge: 'bg-orange-900 text-orange-300',
          num: 'text-orange-300',
          done: '<span class="text-xs font-bold text-gray-500">Pendiente</span>',
          titleCls: 'text-white'
        };
      }
      return {
        card: 'border-sky-700 bg-gray-900',
        badge: 'bg-sky-900 text-sky-300',
        num: 'text-sky-300',
        done: '<span class="text-xs font-bold text-gray-500">Pendiente</span>',
        titleCls: 'text-white'
      };
    }

    function renderCard(item) {
      const s = estadoCard(item);
      return `
        <button onclick="abrirModal('${item.plu_id}')"
                class="w-full text-left border-2 ${s.card} rounded-2xl p-6 transition-all hover:brightness-110">
          <div class="flex items-start justify-between gap-3">
            <span class="inline-block text-xs font-mono px-2 py-0.5 rounded-full ${s.badge}">${item.plu_id}</span>
            ${s.done}
          </div>
          <h3 class="${s.titleCls} text-2xl font-black leading-tight mt-3 mb-6">${item.nombre}</h3>
          <div class="flex items-end justify-between">
            <span class="text-gray-500 text-sm">Cantidad planificada</span>
            <span class="${s.num} text-6xl font-black leading-none tabular-nums">${item.cantidad_planificada}</span>
          </div>
        </button>`;
    }

    function renderKDS() {
      const root = document.getElementById('kds-root');
      const banner = document.getElementById('banner-estado');

      if (!itemsKds.length) {
        banner.className = 'mb-6 text-center py-4 rounded-2xl font-bold text-xl bg-gray-900 text-gray-500 border border-gray-800';
        banner.textContent = 'Sin planificación activa para hoy';
        banner.classList.remove('hidden');
        root.innerHTML = '';
        return;
      }

      banner.classList.add('hidden');
      const calientes = itemsKds.filter(i => i.tipo_cuarto === 'Caliente');
      const frios = itemsKds.filter(i => i.tipo_cuarto === 'Frío' || i.tipo_cuarto === 'Frio');

      let html = '';
      if (calientes.length) {
        html += `
          <section class="mb-10">
            <div class="flex items-center gap-3 mb-5">
              <span class="text-3xl">🔥</span>
              <h2 class="text-3xl font-black text-orange-400 uppercase tracking-widest">Cuarto Caliente</h2>
              <div class="flex-1 h-px bg-orange-900"></div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">${calientes.map(renderCard).join('')}</div>
          </section>`;
      }
      if (frios.length) {
        html += `
          <section>
            <div class="flex items-center gap-3 mb-5">
              <span class="text-3xl">❄️</span>
              <h2 class="text-3xl font-black text-sky-400 uppercase tracking-widest">Cuarto Frío</h2>
              <div class="flex-1 h-px bg-sky-900"></div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">${frios.map(renderCard).join('')}</div>
          </section>`;
      }
      root.innerHTML = html;
    }

    async function cargarCocineros() {
      try {
        const res = await fetch('/api/cocineros');
        cocineros = await res.json();
        const dl = document.getElementById('lista-cocineros');
        dl.innerHTML = cocineros.map(c => `<option value="${c.nombre}"></option>`).join('');
      } catch {
        cocineros = [];
      }
    }

    async function cargarKDS() {
      try {
        const res = await fetch(`/api/produccion?fecha=${today}`);
        const data = await res.json();
        itemsKds = Array.isArray(data)
          ? data.filter(i => Number(i.cantidad_planificada || 0) > 0)
          : [];
        document.getElementById('ultima-act').textContent = new Date().toLocaleTimeString('es-PE');
        renderKDS();
      } catch {
        document.getElementById('kds-root').innerHTML = `
          <div class="text-center py-20">
            <p class="text-red-500 text-2xl font-bold">Error de conexión al servidor</p>
            <p class="text-gray-600 mt-2 text-sm">Reintentando en ${REFRESH_INTERVAL} segundos...</p>
          </div>`;
      }
    }

    function abrirModal(plu_id) {
      modalItem = itemsKds.find(i => i.plu_id === plu_id) || null;
      if (!modalItem) return;

      document.getElementById('modal-plu').textContent = `PLU ${modalItem.plu_id}`;
      document.getElementById('modal-nombre').textContent = modalItem.nombre;
      document.getElementById('modal-plan').textContent = `Planificado: ${modalItem.cantidad_planificada}`;
      document.getElementById('modal-real').value = Number(modalItem.cantidad_real || 0);
      document.getElementById('modal-no-producido').value = Number(modalItem.no_producido || 0);
      document.getElementById('modal-comentarios').value = modalItem.comentarios || '';
      document.getElementById('modal-cocinero').value = modalItem.cocinero_nombre || '';
      document.getElementById('modal-msg').textContent = '';

      document.getElementById('modal-overlay').classList.remove('hidden');
      document.getElementById('modal-registro').classList.remove('hidden');
    }

    function cerrarModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
      document.getElementById('modal-registro').classList.add('hidden');
      modalItem = null;
    }

    async function guardarModal() {
      if (!modalItem) return;

      const real = Number(document.getElementById('modal-real').value) || 0;
      const noProducido = Number(document.getElementById('modal-no-producido').value) || 0;
      const comentarios = document.getElementById('modal-comentarios').value.trim();
      const cocineroNom = document.getElementById('modal-cocinero').value.trim();
      const cocineroObj = cocineros.find(c => c.nombre.toLowerCase() === cocineroNom.toLowerCase());
      const cocinero_id = cocineroObj ? cocineroObj.id : null;

      const btn = document.getElementById('btn-modal-guardar');
      const msg = document.getElementById('modal-msg');
      btn.disabled = true;
      btn.textContent = 'Guardando...';

      try {
        const res = await fetch('/api/produccion_real', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fecha: today,
            plu_id: modalItem.plu_id,
            cantidad_real: real,
            no_producido: noProducido,
            comentarios,
            cocinero_id,
          }),
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || 'No se pudo guardar.');

        modalItem.cantidad_real = real;
        modalItem.no_producido = noProducido;
        modalItem.comentarios = comentarios;
        modalItem.cocinero_id = cocinero_id;
        modalItem.cocinero_nombre = cocineroObj ? cocineroObj.nombre : '';
        modalItem.registro_id = modalItem.registro_id || 1;
        renderKDS();

        msg.className = 'text-sm font-semibold text-emerald-400 mr-auto';
        msg.textContent = 'Guardado correctamente.';
        setTimeout(cerrarModal, 600);
      } catch (e) {
        msg.className = 'text-sm font-semibold text-red-400 mr-auto';
        msg.textContent = e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Guardar';
      }
    }

    function tick() {
      const el = document.getElementById('countdown');
      if (segundos <= 0) {
        cargarKDS();
        segundos = REFRESH_INTERVAL;
      }
      el.textContent = `${segundos}s`;
      if (segundos <= 5) {
        el.classList.remove('text-emerald-400');
        el.classList.add('text-red-400', 'blink');
      } else {
        el.classList.remove('text-red-400', 'blink');
        el.classList.add('text-emerald-400');
      }
      segundos--;
    }

    document.getElementById('modal-overlay').addEventListener('click', cerrarModal);
    cargarCocineros();
    setInterval(tick, 1000);
    tick();
  </script>
</body>
</html>
