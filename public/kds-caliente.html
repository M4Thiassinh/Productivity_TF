<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔥 KDS - Cuarto Caliente</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .en-preparacion {
      animation: pulse 2s ease-in-out infinite;
    }
  </style>
</head>
<body class="bg-gray-950 min-h-screen p-3 md:p-6">

  <!-- HEADER SIN BOTÓN DE VOLVER -->
  <header class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mb-6">
    <div>
      <h1 class="text-2xl md:text-4xl font-black text-white tracking-tight">🔥 KDS - Cuarto Caliente</h1>
      <p class="text-gray-500 text-xs md:text-sm" id="fecha-display"></p>
    </div>

    <!-- MÉTRICAS GLOBALES DEL CUARTO -->
    <div class="bg-gradient-to-br from-red-900/40 to-orange-800/20 border-2 border-red-600 rounded-2xl px-4 py-3 md:px-6 md:py-4">
      <div class="text-xs text-orange-400 font-bold uppercase tracking-wider mb-1">Producción del Cuarto</div>
      <div class="flex items-baseline gap-2">
        <span class="text-3xl md:text-4xl font-black text-orange-300" id="total-producido">0</span>
        <span class="text-xl text-orange-500 font-bold">/</span>
        <span class="text-2xl md:text-3xl font-black text-white" id="total-planificado">0</span>
      </div>
      <div class="mt-1">
        <div class="h-2 bg-gray-800 rounded-full overflow-hidden">
          <div id="barra-progreso" class="h-full bg-gradient-to-r from-red-500 to-orange-400 transition-all duration-500" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <div class="text-right">
        <div class="text-xs text-gray-600 uppercase">Última actualización</div>
        <div class="text-gray-400 font-mono text-xs md:text-sm" id="ultima-act">—</div>
      </div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl px-3 py-2 text-center">
        <div class="text-2xl md:text-4xl font-black font-mono text-emerald-400" id="countdown">30s</div>
        <div class="text-gray-600 text-xs">próxima recarga</div>
      </div>
    </div>
  </header>

  <div id="banner-estado" class="hidden mb-4 text-center py-3 rounded-xl font-bold text-base"></div>

  <!-- GRID MOBILE-FIRST: 1 columna en móvil, 2-3 en desktop -->
  <main id="kds-root" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4"></main>

  <!-- DATALIST COCINEROS -->
  <datalist id="lista-cocineros"></datalist>

  <!-- MODAL INICIAR -->
  <div id="modal-iniciar" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
    <div class="w-full max-w-md bg-gray-900 border border-yellow-700 rounded-2xl shadow-2xl">
      <div class="px-5 py-4 border-b border-yellow-700">
        <h2 class="text-xl font-black text-yellow-400" id="modal-iniciar-nombre"></h2>
        <p class="text-sm text-gray-400" id="modal-iniciar-envase"></p>
      </div>
      <div class="p-5 text-center">
        <p class="text-white text-lg mb-1">¿Iniciar preparación?</p>
        <p class="text-gray-500 text-sm">Se registrará la hora de inicio.</p>
      </div>
      <div class="px-5 pb-5 flex gap-3">
        <button onclick="cerrarModalIniciar()"
                class="flex-1 px-4 py-2 rounded-xl bg-gray-800 hover:bg-gray-700 text-white font-bold transition">
          Cancelar
        </button>
        <button onclick="confirmarIniciar()"
                class="flex-1 px-4 py-2 rounded-xl bg-yellow-600 hover:bg-yellow-500 text-white font-black transition">
          Iniciar
        </button>
      </div>
    </div>
  </div>

  <!-- MODAL FINALIZAR -->
  <div id="modal-finalizar" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
    <div class="w-full max-w-lg bg-gray-900 border border-emerald-700 rounded-2xl shadow-2xl">
      <div class="px-5 py-4 border-b border-emerald-700 flex justify-between items-start">
        <div>
          <p class="text-xs font-bold uppercase text-gray-500" id="modal-finalizar-envase"></p>
          <h2 class="text-xl font-black text-white" id="modal-finalizar-nombre"></h2>
          <p class="text-sm text-gray-400 mt-1" id="modal-finalizar-plan"></p>
        </div>
        <button onclick="cerrarModalFinalizar()"
                class="w-8 h-8 rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-300 text-lg">
          ✕
        </button>
      </div>
      <div class="p-5 space-y-3">
        <!-- Cocinero -->
        <div>
          <label class="text-gray-400 text-xs font-bold uppercase block mb-1">Cocinero</label>
          <input id="input-cocinero" list="lista-cocineros" type="text" autocomplete="off"
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-violet-500" />
        </div>
        <!-- Cantidad Real -->
        <div>
          <label class="text-gray-400 text-xs font-bold uppercase block mb-1">Cantidad Real Producida</label>
          <input id="input-real" type="number" min="0"
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white text-lg font-bold focus:outline-none focus:border-emerald-500" />
        </div>
        <!-- No Producido -->
        <div>
          <label class="text-gray-400 text-xs font-bold uppercase block mb-1">Cantidad No Producida</label>
          <input id="input-no-producido" type="number" min="0"
                 class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white text-lg font-bold focus:outline-none focus:border-amber-500" />
        </div>
        <!-- Comentarios -->
        <div>
          <label class="text-gray-400 text-xs font-bold uppercase block mb-1">Comentarios</label>
          <textarea id="input-comentarios" rows="3"
                    class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-white resize-none focus:outline-none focus:border-gray-500"></textarea>
        </div>
      </div>
      <div class="px-5 pb-5 flex gap-3">
        <button onclick="cerrarModalFinalizar()"
                class="flex-1 px-4 py-2 rounded-xl bg-gray-800 hover:bg-gray-700 text-white font-bold transition">
          Cancelar
        </button>
        <button onclick="confirmarFinalizar()"
                class="flex-1 px-4 py-2 rounded-xl bg-emerald-700 hover:bg-emerald-600 text-white font-black transition">
          Finalizar
        </button>
      </div>
    </div>
  </div>

  <script>
    const REFRESH_INTERVAL = 30;
    const today = new Date().toISOString().slice(0, 10);
    let segundos = 0;
    let cocineros = [];
    let itemsKds = [];
    let itemActual = null;

    document.getElementById('fecha-display').textContent = new Date().toLocaleDateString('es-PE', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    // ══════════════════════════════════════════════════════════
    //  FUNCIONES DE ESTADO
    // ══════════════════════════════════════════════════════════
    function estadoItem(item) {
      // Listo: tiene hora_fin
      if (item.hora_fin) {
        return {
          estado: 'listo',
          card: 'border-emerald-600 bg-emerald-950/40',
          badge: 'bg-emerald-900 text-emerald-300',
          numClass: 'text-emerald-300',
          badgeText: '✓ Listo',
          clickable: false
        };
      }
      // En Preparación: tiene hora_inicio pero no hora_fin
      if (item.hora_inicio) {
        return {
          estado: 'en-preparacion',
          card: 'border-yellow-600 bg-yellow-950/30 en-preparacion',
          badge: 'bg-yellow-900 text-yellow-300',
          numClass: 'text-yellow-300',
          badgeText: '🔥 En Preparación',
          clickable: true
        };
      }
      // Pendiente: sin hora_inicio
      return {
        estado: 'pendiente',
        card: 'border-orange-700 bg-gray-900',
        badge: 'bg-orange-900 text-orange-300',
        numClass: 'text-orange-300',
        badgeText: 'Pendiente',
        clickable: true
      };
    }

    // ══════════════════════════════════════════════════════════
    //  RENDER TARJETAS
    // ══════════════════════════════════════════════════════════
    function renderCard(item) {
      const s = estadoItem(item);
      const envase = item.envase || 'Sin envase';
      const division = `Tienda: ${item.cant_tienda} | Sala: ${item.cant_sala} | Marley: ${item.cant_marley}`;
      const progreso = `${item.total_producido} / ${item.total_planificado}`;

      const cursorClass = s.clickable ? 'cursor-pointer hover:brightness-110' : 'opacity-70';
      const onclickAttr = s.clickable ? `onclick="abrirModal('${item.plu_id}', '${s.estado}')"` : '';

      return `
        <button ${onclickAttr}
                class="w-full text-left border-2 ${s.card} rounded-xl p-4 transition-all ${cursorClass}"
                data-plu="${item.plu_id}">
          <div class="flex items-start justify-between gap-2 mb-3">
            <span class="inline-block text-xs font-bold px-2 py-1 rounded-full ${s.badge}">
              ${s.badgeText}
            </span>
            <span class="text-lg font-black text-white">${envase}</span>
          </div>
          <h3 class="text-white text-lg md:text-xl font-black leading-tight mb-3">
            ${item.nombre}
          </h3>
          <div class="text-xs text-gray-400 mb-2">${division}</div>
          <div class="flex items-end justify-between">
            <div>
              <div class="text-gray-500 text-xs">Progreso</div>
              <div class="text-white font-bold text-sm">${progreso}</div>
            </div>
            <span class="${s.numClass} text-4xl md:text-5xl font-black leading-none">
              ${item.total_planificado}
            </span>
          </div>
        </button>`;
    }

    function renderKDS() {
      const root = document.getElementById('kds-root');
      const banner = document.getElementById('banner-estado');

      if (!itemsKds.length) {
        banner.className = 'mb-4 text-center py-3 rounded-xl font-bold text-base bg-gray-900 text-gray-500 border border-gray-800';
        banner.textContent = 'Sin planificación activa para hoy (Cuarto Caliente)';
        banner.classList.remove('hidden');
        root.innerHTML = '';
        actualizarMetricasGlobales(0, 0);
        return;
      }

      banner.classList.add('hidden');
      root.innerHTML = itemsKds.map(renderCard).join('');

      // Calcular métricas globales
      const totales = itemsKds.reduce((acc, item) => {
        acc.producido += item.total_producido || 0;
        acc.planificado += item.total_planificado || 0;
        return acc;
      }, { producido: 0, planificado: 0 });

      actualizarMetricasGlobales(totales.producido, totales.planificado);
    }

    // ══════════════════════════════════════════════════════════
    //  ACTUALIZAR MÉTRICAS GLOBALES
    // ══════════════════════════════════════════════════════════
    function actualizarMetricasGlobales(producido, planificado) {
      document.getElementById('total-producido').textContent = producido;
      document.getElementById('total-planificado').textContent = planificado;

      // Calcular porcentaje para la barra de progreso
      const porcentaje = planificado > 0 ? Math.round((producido / planificado) * 100) : 0;
      document.getElementById('barra-progreso').style.width = porcentaje + '%';
    }

    // ══════════════════════════════════════════════════════════
    //  MODAL INICIAR
    // ══════════════════════════════════════════════════════════
    function abrirModal(plu_id, estado) {
      itemActual = itemsKds.find(i => i.plu_id === plu_id);
      if (!itemActual) return;

      if (estado === 'pendiente') {
        document.getElementById('modal-iniciar-nombre').textContent = itemActual.nombre;
        document.getElementById('modal-iniciar-envase').textContent = `Envase: ${itemActual.envase || 'N/A'}`;
        document.getElementById('modal-iniciar').classList.remove('hidden');
      } else if (estado === 'en-preparacion') {
        document.getElementById('modal-finalizar-nombre').textContent = itemActual.nombre;
        document.getElementById('modal-finalizar-envase').textContent = itemActual.envase || 'Sin envase';
        document.getElementById('modal-finalizar-plan').textContent =
          `Total planificado: ${itemActual.total_planificado} | Producido: ${itemActual.total_producido}`;
        document.getElementById('input-real').value = '';
        document.getElementById('input-no-producido').value = '';
        document.getElementById('input-cocinero').value = '';
        document.getElementById('input-comentarios').value = '';
        document.getElementById('modal-finalizar').classList.remove('hidden');
      }
    }

    function cerrarModalIniciar() {
      document.getElementById('modal-iniciar').classList.add('hidden');
      itemActual = null;
    }

    function cerrarModalFinalizar() {
      document.getElementById('modal-finalizar').classList.add('hidden');
      itemActual = null;
    }

    async function confirmarIniciar() {
      if (!itemActual) return;
      try {
        const res = await fetch('/api/produccion/iniciar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fecha: today, plu_id: itemActual.plu_id })
        });
        const data = await res.json();
        if (data.success) {
          cerrarModalIniciar();
          await cargarDatos();
        } else {
          alert('Error: ' + (data.error || 'No se pudo iniciar'));
        }
      } catch (e) {
        alert('Error de conexión');
      }
    }

    async function confirmarFinalizar() {
      if (!itemActual) return;

      const cantidad_real = parseInt(document.getElementById('input-real').value) || 0;
      const no_producido = parseInt(document.getElementById('input-no-producido').value) || 0;
      const cocineroNombre = document.getElementById('input-cocinero').value.trim();
      const comentarios = document.getElementById('input-comentarios').value.trim();

      // Buscar ID del cocinero
      const cocinero = cocineros.find(c => c.nombre === cocineroNombre);
      const cocinero_id = cocinero ? cocinero.id : null;

      try {
        const res = await fetch('/api/produccion/finalizar', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fecha: today,
            plu_id: itemActual.plu_id,
            cantidad_real,
            no_producido,
            cocinero_id,
            comentarios
          })
        });
        const data = await res.json();
        if (data.success) {
          cerrarModalFinalizar();
          await cargarDatos();
        } else {
          alert('Error: ' + (data.error || 'No se pudo finalizar'));
        }
      } catch (e) {
        alert('Error de conexión');
      }
    }

    // ══════════════════════════════════════════════════════════
    //  CARGAR DATOS
    // ══════════════════════════════════════════════════════════
    async function cargarDatos() {
      try {
        const [resKds, resCocineros] = await Promise.all([
          fetch(`/api/planificacion/kds?fecha=${today}&tipo=Caliente`),
          fetch('/api/cocineros')
        ]);
        itemsKds = await resKds.json();
        cocineros = await resCocineros.json();

        // Llenar datalist
        const datalist = document.getElementById('lista-cocineros');
        datalist.innerHTML = cocineros.map(c => `<option value="${c.nombre}"></option>`).join('');

        renderKDS();
        document.getElementById('ultima-act').textContent = new Date().toLocaleTimeString('es-PE');
      } catch (e) {
        console.error(e);
      }
    }

    // ══════════════════════════════════════════════════════════
    //  COUNTDOWN Y AUTO-REFRESH
    // ══════════════════════════════════════════════════════════
    function updateCountdown() {
      segundos = (segundos + 1) % REFRESH_INTERVAL;
      const restantes = REFRESH_INTERVAL - segundos;
      document.getElementById('countdown').textContent = restantes + 's';
      if (segundos === 0) cargarDatos();
    }

    setInterval(updateCountdown, 1000);
    cargarDatos();
  </script>
</body>
</html>
